<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1 th:text="${message}"></h1>
<div th:if="${img != null}">
    <img th:src="${img}" width="300" height="300" />
</div>
<!--img != null 이면 이거 보여줌-->
<div th:else>
    <div th:each="img : ${imgs}">
        <img th:src="${img}" width="300" height="300">
    </div>
<!--    타임리프 반복문-->
</div>
</body>
</html>
